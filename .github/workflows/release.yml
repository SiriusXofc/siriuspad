name: SiriusPad CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage"
          - platform: windows-latest
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm deps
        run: npm ci

      - name: Verify version sync
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const packageVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version
          const tauriVersion = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8')
          const cargoVersion = cargoToml.match(/^version = "(.+)"$/m)?.[1]

          if (!cargoVersion) {
            throw new Error('Unable to read Cargo.toml version')
          }

          const versions = [packageVersion, tauriVersion, cargoVersion]
          if (new Set(versions).size !== 1) {
            throw new Error(`Version mismatch: package=${packageVersion}, tauri=${tauriVersion}, cargo=${cargoVersion}`)
          }

          console.log(`Version sync OK: ${packageVersion}`)
          NODE

      - name: Build Tauri app
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v'))
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -- ${{ matrix.args }}

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v7
        with:
          name: SiriusPad-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*setup.exe
          if-no-files-found: ignore

      - name: Build and publish Tauri release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SiriusPad ${{ github.ref_name }}"
          releaseBody: |
            Esta release consolida oficialmente o pacote atual do SiriusPad e publica uma rodada forte de estabilidade, experiência mobile, IA integrada, Git Sync nativo e melhoria de arquitetura.

            ## Estabilidade e Arquitetura

            - **Sincronização Cloud mais estável:** o cliente do Supabase agora é reutilizado por credencial, evitando múltiplas conexões desnecessárias e reduzindo erros de sync.
            - **Atalhos globais corrigidos:** foi resolvido o conflito em que atalhos como o do terminal paravam de responder enquanto você estava digitando ou editando o conteúdo.
            - **Git Sync nativo no desktop:** o SiriusPad agora consegue iniciar o repositório das notas, configurar remoto e sincronizar com `pull --rebase` e `push` via backend Tauri.
            - **Cobertura de traduções ampliada:** `pt-BR`, `en` e `es` foram alinhados para Git Sync, Vim mode, updater, wikilinks, comandos móveis e estados novos da interface.

            ## Sistema de Atualização Premium

            - **Novo design do UpdateModal:** a tela de atualização foi redesenhada com visual mais moderno, gradientes, glassmorphism e etapas visuais de progresso.
            - **Fluxo passo a passo:** o modal agora comunica melhor os estados de **download -> instalação -> reinício**, deixando o processo mais claro para o usuário.
            - **Android com atualização guiada:** no mobile, quando existe nova versão, o app pode direcionar o usuário direto para baixar o APK beta no navegador.

            ## Ferramentas de Desenvolvedor

            - **DevTools interno (`F12`):** o app agora traz console e inspeção básica do estado local sem depender de ferramenta externa.
            - **Proteção de dados locais no DevTools:** chaves sensíveis como token do GitHub, chave da IA e chave pública do Supabase passaram a aparecer mascaradas.
            - **StatusBar mais inteligente:** a barra inferior foi refinada para telas pequenas e agora deixa mais claro o estado do sync com Supabase e Git.

            ## Experiência Mobile

            - **Barra de formatação Markdown:** adicionada uma barra rápida para escrita no mobile.
            - **Gestos de swipe:** deslizar uma nota agora expõe ações rápidas como fixar e excluir.
            - **Paleta de comandos em tela cheia no celular:** a busca ficou mais prática para uso com o polegar.
            - **Mobile FAB inteligente:** o botão flutuante some enquanto você está editando para não atrapalhar a visão.
            - **Pacote Android beta oficial:** o workflow publica o APK nomeado do SiriusPad direto na release.

            ## Sirius AI

            - **IA integrada ao contexto da nota ativa:** o Sirius AI pode ler a nota atual para ajudar com resumo, explicação técnica, brainstorming e apoio em bugs.
            - **Suporte local e cloud:** o app aceita provedores compatíveis com OpenAI/Groq e também fluxos locais com **Ollama** ou **LM Studio**.
            - **Preset de Ollama nas configurações:** configuração mais rápida para quem quer usar modelo local sem montar tudo manualmente.

            ## Qualidade da release

            - Workflow do GitHub Actions atualizado para runtimes compatíveis com **Node 24**.
            - CI validado com `npm run build`, `npm run lint` e `cargo check`.

            ## Distribuição oficial

            - `.deb` para Linux
            - `.AppImage` para Linux
            - `.exe` para Windows
            - `.apk` beta para Android
            - `latest.json` para o fluxo de auto-update no desktop

            Consulte o `CHANGELOG.md` para o histórico técnico desta versão.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Prune auxiliary release assets
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            case "$asset" in
              *.deb|*.AppImage|*.exe|*.apk|latest.json) ;;
              *) gh release delete-asset "${{ github.ref_name }}" "$asset" --yes || true ;;
            esac
          done

  android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps for Android branding
        shell: bash
        run: python -m pip install --upgrade pip pillow

      - name: Install Rust with Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install npm deps
        run: npm ci

      - name: Verify version sync
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const packageVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version
          const tauriVersion = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8')
          const cargoVersion = cargoToml.match(/^version = "(.+)"$/m)?.[1]

          if (!cargoVersion) {
            throw new Error('Unable to read Cargo.toml version')
          }

          const versions = [packageVersion, tauriVersion, cargoVersion]
          if (new Set(versions).size !== 1) {
            throw new Error(`Version mismatch: package=${packageVersion}, tauri=${tauriVersion}, cargo=${cargoVersion}`)
          }

          console.log(`Version sync OK: ${packageVersion}`)
          NODE

      - name: Initialize Android target
        shell: bash
        run: npx tauri android init --ci --skip-targets-install

      - name: Apply SiriusPad Android branding
        shell: bash
        run: python3 scripts/generate_android_icons.py src-tauri/gen/android/app/src/main/res

      - name: Build Android beta APK
        shell: bash
        run: npx tauri android build --debug --apk -t aarch64

      - name: Locate Android APK
        id: android_apk
        shell: bash
        run: |
          apk_path="$(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "Nenhum APK foi encontrado em src-tauri/gen/android/app/build/outputs/apk" >&2
            exit 1
          fi
          version="$(node -p "require('./package.json').version")"
          named_apk="dist/SiriusPad_${version}_android.apk"
          mkdir -p dist
          cp "$apk_path" "$named_apk"
          echo "apk_path=$apk_path" >> "$GITHUB_OUTPUT"
          echo "named_apk=$named_apk" >> "$GITHUB_OUTPUT"
          echo "APK localizado em: $apk_path"
          echo "APK nomeado em: $named_apk"

      - name: Upload Android build artifact
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v7
        with:
          name: SiriusPad-android
          path: ${{ steps.android_apk.outputs.named_apk }}
          if-no-files-found: error

      - name: Ensure GitHub release exists
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" \
            --title "SiriusPad ${{ github.ref_name }}" \
            --notes "APK beta do SiriusPad para Android."

      - name: Upload Android APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" "${{ steps.android_apk.outputs.named_apk }}" --clobber
