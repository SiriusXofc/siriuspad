name: SiriusPad CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: '--bundles deb'
          - platform: windows-latest
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm deps
        run: npm ci

      - name: Verify version sync
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const packageVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version
          const tauriVersion = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8')
          const cargoVersion = cargoToml.match(/^version = "(.+)"$/m)?.[1]

          if (!cargoVersion) {
            throw new Error('Unable to read Cargo.toml version')
          }

          const versions = [packageVersion, tauriVersion, cargoVersion]
          if (new Set(versions).size !== 1) {
            throw new Error(`Version mismatch: package=${packageVersion}, tauri=${tauriVersion}, cargo=${cargoVersion}`)
          }

          console.log(`Version sync OK: ${packageVersion}`)
          NODE

      - name: Build Tauri app
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v'))
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -- ${{ matrix.args }}

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: SiriusPad-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*setup.exe
          if-no-files-found: ignore

      - name: Build and publish Tauri release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SiriusPad ${{ github.ref_name }}'
          releaseBody: |
            Nova versão pública do SiriusPad.

            Esta release mantém a distribuição oficial do app em:
            - `.deb` para Linux
            - `.exe` para Windows
            - `latest.json` para o fluxo de auto-update

            Consulte o `CHANGELOG.md` para ver os detalhes da versão.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Prune auxiliary release assets
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            case "$asset" in
              *.deb|*.exe|latest.json) ;;
              *) gh release delete-asset "${{ github.ref_name }}" "$asset" --yes || true ;;
            esac
          done
